language: python
sudo: false
python:
  - 3.6
addons:
    postgresql: "9.6"

services:
  - redis-server
  - postgresql

env:
  global:
    - NODE_ENV=production
    - PIP_DISABLE_PIP_VERSION_CHECK=on
    - TRAVIS_NODE_VERSION=8.9.1
    - DJANGO=2.1

install:
  - nvm install $TRAVIS_NODE_VERSION
  - npm install -g yarn@1.3.2
  - pip install tox codecov

script:
  - npm install
  - mkdir /tmp/static
  - tox -re d21-py36

before_success:
  - coverage erase

after_success:
  - coverage combine
  - codecov

notifications:
    slack: bitcaster-io:lfI1bJDyLzctx1Jp5H2arJKY
