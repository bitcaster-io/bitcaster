[isort]
combine_as_imports = true
default_section = THIRDPARTY
include_trailing_comma = true
;forced_separate = django.contrib,django.utils
line_length = 80
known_future_library = future,pies
;known_standard_library =
known_third_party = rest_framework,django,constance,rest_framework
known_first_party = mercury
multi_line_output = 0
balanced_wrapping = true
not_skip = __init__.py
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

[wheel]
universal = 1

[egg_info]
tag_build =
tag_date = 0
tag_svn_revision = 0

[devpi:upload]
formats = sdist.tgz

[check-manifest]
ignore =
    .travis.yml
    Makefile
    *.sqlite
    .tox/*

[flake8]
max-complexity = 12
max-line-length = 120
exclude = _plugin_template migrations settings
ignore = E401,W391,E128,E261,E731,Q000
putty-ignore =
    ;    tests/test_choice_as_instance.py : E501
    tests/test_multiple.py : E501
