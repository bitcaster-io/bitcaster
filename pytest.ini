[pytest]
norecursedirs = data .tox _plugin_template ~*
python_paths = ./src
;DJANGO_SETTINGS_MODULE = mercury.config.settings.default
django_find_project = false
addopts =
        -p no:xdist
        -p no:pep8
        --doctest-modules
        --reuse-db
        --tb=short
        --capture=no
        --cov-report=html
        --cov-config=tests/.coveragerc
        --cov=mercury


python_files=test_*.py
pep8ignore = * ALL
