<input autocomplete="false" type="{{ widget.type }}" name="{{ widget.name }}"{% if widget.value != None %}
       value="{{ widget.value|stringformat:'s' }}"{% endif %}{% include "django/forms/widgets/attrs.html" %}>
<span data-toggle="#{{ widget.attrs.id }}"
      onmousedown="bitcaster.passwords.show(this);"
      onmouseup="bitcaster.passwords.hide(this);"
      class="fa fa-fw fa-eye-slash widget-eye-icon toggle-password"></span>
