{% load markdown bitcaster %}
<div class="modal-header">
    <h3 class="modal-title" id="exampleModalLongTitle">
        {{ handler.name }}
    </h3>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body handler-usage">
    <div class=" row col-12">
        A code has been sent to your {{ object.channel.handler.name }}
        account&nbsp;<strong> {{ object.address.address }} </strong>.
        <div class="container-fluid p-3">
            <form action="{% org-url "user-address-verify" object.pk %}" method="post">
                {% csrf_token %}
                <input type="number" name="code" value=""
                       placeholder="code"
                       class="textinput textInput form-control">
                <div class="container-fluid p-3">
                    <button id="resend" type="button" class="btn btn-outline-success">Send Again</button>
                    <input class="btn btn-primary" type="submit" value="Verify Address">
                </div>
            </form>
        </div>
        <div id="message" class="container-fluid"></div>
    </div>

</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
</div>
<script>
    $('#resend').on('click', function () {
        $.get('{% org-url "user-address-resend" object.pk %}')
            .done(function (data) {
                $('#message').html('Code sent to ' +data.recipient)
            })
            .fail(function (resp, msg, data) {
                $('#message').html(resp.responseJSON.message);
            })
    });
</script>
