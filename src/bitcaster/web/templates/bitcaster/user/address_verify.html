{% load bitcaster i18n %}
<div class="modal-header">
    <h3 class="modal-title" id="exampleModalLongTitle">
        {{ handler.name }}
    </h3>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<style>
    .confirmation_code {
        {#display: table;#}
        width: 600px;
        alignment: center;
        text-align: center;
         display: flex;
        justify-content: space-around;
    }

    .confirmation_code_group {
        display: flex;
        width: 200px;
    }

    .confirmation_code_span_cell {
        font-size: 2.5rem;
        height: 3rem;
        margin: 5px;

    }

    .confirmation_code_group input {
        margin: 5px;
        display: inline;
        width: 44px;
        font-size: 1.5rem;
        height: 3rem;
        text-align: center;
    }
</style>
<div class="modal-body handler-usage">
    <div class=" row col-12">
        {% blocktrans %}
            A code has been sent to your {{ object.channel.handler.name }}
            account&nbsp;<strong> {{ object.address.address }} </strong>.
        {% endblocktrans %}
        <div class="container-fluid p-3">
            <form action="#">
                {% csrf_token %}
                <input type="hidden" name="code" value=""
                       placeholder="code"
                       class="textinput textInput form-control">

                <div class="confirmation_code split_input large_bottom_margin" data-multi-input-code="true">
                    <div class="confirmation_code_group">
                        <input type="text" class="inline_input first" maxlength="1" tabindex="1">
                        <input type="text" class="inline_input" maxlength="1" tabindex="2">
                        <input type="text" class="inline_input" maxlength="1" tabindex="3">
                        <div class="confirmation_code_span_cell">—</div>
                        <input type="text" class="inline_input" maxlength="1"  tabindex="4">
                        <input type="text" class="inline_input" maxlength="1"  tabindex="5">
                        <input type="text" class="inline_input" maxlength="1" tabindex="6">
                    </div>
                </div>
                <div class="row p-3">
                    <div class="col-9">
                        <button id="verify"  tabindex="7" type="button" class="btn btn-primary">Verify Address</button>
                    </div>
                    <div class="col-3">
                        <button id="resend" type="button" class="btn btn-outline-success">Send Again</button>
                    </div>
                </div>

            </form>
        </div>
        <div id="message" style="min-height: 20px;" class="container-fluid"></div>
    </div>

</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
</div>
<script>
    $(function () {
        $('#modalWindow').on('shown.bs.modal', function (e) {
            $(".inline_input.first").focus();
        });
        var csrftoken = $("[name=csrfmiddlewaretoken]").val();

        function csrfSafeMethod(method) {
            return (/^(GET|HEAD|OPTIONS|TRACE)$/.test(method));
        }

        $(".inline_input").keyup(function () {
            if (this.value.length === 1) {
                $('input, button')[$('input,button').index(this)+1].focus();
                {#var $next = $(this).next('.inline_input');#}
                {#if ($next.length)#}
                {#    $(this).next('.inline_input').focus();#}
                {#else#}
                {#    $(this).next().next('.inline_input').focus()#}
            }
        });

        $.ajaxSetup({
            beforeSend: function (xhr, settings) {
                $('#message').html('');

                if (!csrfSafeMethod(settings.type) && !this.crossDomain) {
                    xhr.setRequestHeader("X-CSRFToken", csrftoken);
                }
            }
        });
        $('#verify').on('click', function (e) {
            var code = '';
            $('.inline_input').each(function () {
                code += this.value;
            });

            {#var code = $('input[name="code"]').val();#}
            if (!code) {
                return
            }
            $.post('{% org-url "user-address-verify" object.pk %}', {code: code})
                .done(function (data) {
                    new Noty({
                        type: 'success',
                        theme: 'bootstrap-v4',
                        closeWith: ['click', 'button'],
                        layout: 'topRight',
                        timeout: 1000,
                        text: data.message,
                    }).show();
                    $('#modalWindow').modal('hide');
                    $('a[data-owner="btn-verify-{{ object.pk }}"]').hide();
                })
                .fail(function (resp, msg, data) {
                    $('#message').addClass('red').html(resp.responseJSON.message);
                })
        });
        $('#resend').on('click', function () {
            $('input[type=number]').val('');
            $.get('{% org-url "user-address-resend" object.pk %}')
                .done(function (data) {
                    $('#message').removeClass('red').html('Code sent to ' + data.recipient)
                })
                .fail(function (resp, msg, data) {
                    $('#message').addClass('red').html(resp.responseJSON.message);
                })
        });
    });

</script>
