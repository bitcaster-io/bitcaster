{% extends "bitcaster/modal.html" %}{% load markdown %}
{% block modal-body %}
    <div class="col-12 plugin-info h-100 pr-0">
        <div class="row header col-12 h1 align-middle pr-0" style="line-height: 100px">
            <img width="100" height="100" src="{% url "plugin-icon" handler.fqn %}">
            <div class="pl-5">{{ handler.name }}</div>
        </div>
        <div class="row col-12 pr-0 content">
            <div class="col-12 left">
                {{ usage|markdown }}
            </div>
        </div>
    </div>

{% endblock %}
