{% extends "bitcaster/application/base.html" %}{% load i18n bitcaster %}
{% block page %}
    <div class="container">
        <div class="row col-12">
            <div class="pull-right col-12 p-4">
                <a class="btn btn-danger btn-small pull-right"
                   href="{% app-url "app-role-create" %}">{% trans "Create Role" %}</a>
            </div>
        </div>
    </div>
    <table class="table table-striped table-hover col-12">
        <thead>
        <tr>
            <th cope="col">Team</th>
            <th cope="col">Role</th>
            <th cope="col"></th>
        </tr>
        </thead>
        <tbody>
        {% for team in object_list %}
            <tr>
                <td>{{ team.team.name }}</td>
                <td>{{ team.get_role_display }}</td>
                <td style="width:30%" class="nowrap">
                    <a class="btn btn-light {% if not event.enabled_channels.exists %}red{% endif %}"
                       data-toggle="tooltip" title="configure"
                       href="{{ team.pk }}/edit/">
                        <i class="fas fa-wrench pointer"></i>
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

{% endblock page %}
