{% extends "bitcaster/application/team/base.html" %}{% load crispy_forms_filters menu i18n bitcaster %}
{% block page %}
    <form method="post" action="." class="col-12">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary btn-small pull-left mr-3">{% trans "Save" %}</button>
        <button type="button"
                class="btn btn-light btn-small pull-left"
                onclick="window.location.href = '{{ organization.urls.groups }}';">
            Cancel
        </button>
    </form>
{% endblock %}
{% block js %}
    <script>
        $('#id_manager').select2({
            ajax: {
                url: '{{ manager_autocomplete_url }}',
                dataType: 'json'
            }
        });
    </script>
{% endblock %}
