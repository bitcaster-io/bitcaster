{% extends "bitcaster/app.html" %}
{% block content %}
    <h2>Events</h2>
        <table class="table table-striped table-hover col-12">
            <thead>
            <tr>
                <th scope="col">Event</th>
                <th class="text-center" scope="col">active</th>
            </tr>
            </thead>
            <tbody>
            {% for event in object_list %}
                <tr>
                    <td>
                        {{ event.name }}
                    </td>
                    <td class="text-center">
                        {% if event.enabled %}
                        <i class="fa fa-check-circle green"></i>
                        {% else %}
                        <i class="fa fa-exclamation-circle red"></i>
                        {% endif %}
{#                        {{ subscription.active }}#}
                    </td>
                </tr>

            {% endfor %}
            </tbody>

        </table>

{% endblock content %}
