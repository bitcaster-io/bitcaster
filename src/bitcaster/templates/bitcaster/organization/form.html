{% extends "bitcaster/organization/base.html" %}{% load crispy_forms_filters i18n %}
{% block page %}
    <div class="container-fluid">
        <div class="row col-12">
            <div class="container-fluid">
                <form method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-12">
                            {% csrf_token %}
                            {{ form|crispy }}
                            <input type="submit" value="{% trans "Save" %}" class="btn btn-primary">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>


{% endblock page %}
