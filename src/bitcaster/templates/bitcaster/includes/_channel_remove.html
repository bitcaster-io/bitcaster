<h2>Remove Channel</h2>
<div class="container-fluid">
    <h5 class="text-center alert alert-danger">
        This action is not recoverable
    </h5>
    <div class="card mb-5">
        <div class="card-block">
            <p class="card-text p-5">
                Channel <strong>{{ channel }}</strong> will be permanently removed and
                all subcriptions using this channel will be removed as well.
            </p>
        </div>
    </div>
    <form method="post">
        {% csrf_token %}
        <input type="submit" class="btn btn-danger" value="Remove">
    </form>
</div>
