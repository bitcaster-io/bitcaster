{% load crispy_forms_tags i18n bc_channels bc_assets %}
{% block content %}
    <h2>Channels</h2>
    <div class="container">
        <div class="row col-12">
            <div class="pull-right col-12 p-4">
                <a class="btn btn-danger btn-small pull-right"
                   href="{{ create_url }}">{% trans "Create channel" %}</a>
            </div>
        </div>
    </div>
    <table class="table table-striped table-hover col-12 channel-list">
        <tbody>
        {% for channel in object_list %}
            <tr>
                <td>
                    <img width="100" class="{% if channel.enabled and channel.deprecated %}blur{% endif %}" height="100"
                         src="{% url "plugin-icon" channel.handler.fqn %}">
                </td>
                <td>
                    {{ channel.name }}
                </td>
                <td style="width:5%">
                    <i class="{% if channel.enabled %}fas fa-check green{% else %}far fa-circle red{% endif %}"></i>
                </td>
                <td style="width:30%" class="nowrap">
                    <a class="btn btn-light"
                       data-toggle="tooltip" title="configure"
                       href="{{ channel.pk }}/edit/">
                        <i class="fas fa-wrench pointer"></i>
                    </a>
                    <a class="btn btn-light"
                       data-toggle="tooltip" title="{% if channel.enabled %}Disable{% else %}Enable{% endif %}"
                       href="{{ channel.pk }}/toggle/">
                        <i class="fas {% if channel.enabled %}fa-toggle-off red{% else %}fa-toggle-on green{% endif %}"></i>
                    </a>
                    <a class="btn btn-light"
                       data-toggle="tooltip" title="delete"
                       href="{{ channel.pk }}/delete/">
                        <i class="far fa-trash-alt pointer"></i>
                    </a>


                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

{% endblock content %}
