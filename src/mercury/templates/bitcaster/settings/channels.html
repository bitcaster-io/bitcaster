{% extends "bitcaster/settings/base.html" %}{% load crispy_forms_tags bc_dispatchers i18n %}
{% block content %}
    <style type="text/css">
        .channel-list img {
            width: 50px;
            height: 50px;
        }

        .handler-row {
            border-bottom: 1px grey solid;
            height: 90px;
            padding: 10px;
        {#text-align: center;#}{#vertical-align: middle;#}
        }

        .handler-name {
        {#border-bottom:1px grey solid;#}{#height: 90px;#}{#text-align: center;#} vertical-align: middle;
        }

    </style>
    <h2>{{ title }}</h2>
    <div class="container">
        <div class="row col-12">
            <div class="pull-right col-12 p-4">
                <a class="btn btn-danger btn-small pull-right"
                   href="{% url "system-channel-create" %}">{% trans "Create channel" %}</a>
            </div>
        </div>
    </div>
    <div class="container-fluid channel-list">
        {% for channel in channels %}
            <div class="row col-10 handler-row">
                <div class="col-2 handler-logo">
                    <img width="100" height="100" src="{% url "plugin-icon" channel.handler.fqn %}">
                </div>
                <div class="col-5 handler-name">
                    <strong>{{ channel.name }}</strong>
                    <div class="pt-3"><a href="#">Configure</a></div>
                </div>
                <div class="col-1 text-center vertical-align-center">
                    <input type="checkbox"></input>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock content %}
