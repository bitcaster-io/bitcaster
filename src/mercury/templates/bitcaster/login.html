{% extends "bitcaster/base.html" %}
{% load i18n crispy_forms_tags bc_assets %}

{% block header %}{% endblock header %}
{% block footer %}{% endblock footer %}
{% block sidebar %}{% endblock sidebar %}
{% block container %}
    <div class="container">
        <div class="row col-12 justify-content-center align-items-center">
            <div class="box box-modal login-form col-6 p-3">
                <div class="box box-header">
                    <a href="//bitcaster.io/"><img src="{% asset "logos/bitcaster32.png" %}">
                        bitcaster
                    </a>
                </div>
                <div class="container-fluid p-3">
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="/">
                        {{ form|crispy }}
                        <input type="submit" value="Login"
                               class="btn btn-primary"/>
                    </form>
                </div>
                <div class="box box-footer social-auth">
                    <div class="row  justify-content-center">
                        <a href="{% url "social:begin" "google-oauth2" %}">
                            <img src="{% asset "social_auth_google.png" %}">
                        </a>
                        <a href="{% url "social:begin" "github" %}">
                            <img src="{% asset "social_auth_github.png" %}">
                        </a>
                        <a href="{% url "social:begin" "linkedin" %}">
                            <img src="{% asset "social_auth_linkedin.png" %}">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
