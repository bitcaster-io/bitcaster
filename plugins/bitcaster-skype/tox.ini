[tox]
envlist = py{36}

[pytest]
norecursedirs = .tox
python_paths = ./src;./tests
django_find_project = false
addopts =
        -p no:xdist
        -p no:pep8
        --tb=short
        --capture=no
        --cov-report=html
        --cov-report=term
        --cov-config=tests/.coveragerc
        --cov=bitcaster_skype


python_files=test_*.py
pep8ignore = * ALL

[testenv]
deps=
     d20: django>=2.0,<=2.1
     pytest

commands =
    {posargs:pytest tests}
