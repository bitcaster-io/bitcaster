[tox]
envlist = py{36}

[pytest]
norecursedirs = data .tox _plugin_template
python_paths = ./src
django_find_project = false
addopts =
        -p no:xdist
        -p no:pep8
        --doctest-modules
        --reuse-db
        --tb=short
        --capture=no
        --cov-report=html
        --cov-report=term
        --cov-config=tests/.coveragerc
        --cov=mercury_plivo


python_files=test_*.py
pep8ignore = * ALL

[testenv]
deps=
     d20: django>=2.0,<=2.1
     pytest

commands =
    {posargs:pytest tests}

