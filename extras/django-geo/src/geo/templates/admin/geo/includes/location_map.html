{% load geo static %}

<div>
    <div id="map" class="map"></div>
</div>

<script type="text/javascript" src="{% static 'admin/js/vendor/jquery/jquery.js' %}"></script>
<link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.css"/>
<script src="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    #map {
        height: 400px;
        width: 100%;
        border: 1px solid #000000;
    }
</style>
<script>
    var coords = [{{ adminform.form.instance.lat|default_if_none:0 }}, {{ adminform.form.instance.lng|default_if_none:0 }}];
    var map = L.map('map').setView(coords, 2);

    L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png', {

    }).addTo(map);

    L.Marker.prototype.animateDragging = function () {

        var iconMargin, shadowMargin;

        this.on('dragstart', function () {
            if (!iconMargin) {
                iconMargin = parseInt(L.DomUtil.getStyle(this._icon, 'marginTop'));
                shadowMargin = parseInt(L.DomUtil.getStyle(this._shadow, 'marginLeft'));
            }

            this._icon.style.marginTop = (iconMargin - 15) + 'px';
            this._shadow.style.marginLeft = (shadowMargin + 8) + 'px';
        });

        return this.on('dragend', function () {
            this._icon.style.marginTop = iconMargin + 'px';
            this._shadow.style.marginLeft = shadowMargin + 'px';
            var result = this.getLatLng();  // but using the passed event is cleaner
            $('#id_lat').val(result.lat).css('border', '1px solid red').css('color', 'red');
            $('#id_lng').val(result.lng).css('border', '1px solid red').css('color', 'red');
        });
    };

    L.marker(coords, {draggable: true})
            .animateDragging()
            .addTo(map);


</script>
