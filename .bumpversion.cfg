[bumpversion]
current_version = 0.3.0a7
commit = True
tag = False
allow_dirty = True
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<release>\d+)((?P<stage>[a-z]+)(?P<num>\d+))?
serialize = 
	{major}.{minor}.{release}{stage}{num}
	{major}.{minor}.{release}
	{major}.{minor}
message = 
	Bump version: {current_version} → {new_version}

[bumpversion:part:stage]
optional_value = final
first_value = final
values = 
	a
	b
	rc
	final

[bumpversion:file:CHANGES]
serialize = 
	{major}.{minor}.{release}

[bumpversion:file:docker/Makefile]

[bumpversion:file:src/bitcaster/__init__.py]
serialize = 
	{major}.{minor}.{release}{stage}{num}

