exclude: '^$'
fail_fast: false
repos:
  - repo: local
    hooks:
      - id: isort
        args:
          - --check-only
        exclude: tweepy
        name: isort
        entry: isort
        language: system
        types: [python]
        stages: [commit]

      - id: flake8
        exclude: /(_plugin_template|python_twitter|migrations|tweepy)/
        name: flake8
        entry: flake8
        args:
          - src/
        language: system
        types: [python]
        stages: [commit]

  - repo: git://github.com/Yelp/detect-secrets
    rev: 0.9.1
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: (tests/.*|.*/tenant\.sql|Pipfile\.lock|.*\.js)
        stages: [push]

  - repo: git://github.com/pre-commit/pre-commit-hooks
    rev: v2.1.0
    hooks:
      - id: double-quote-string-fixer
        stages: [commit]

      - id: debug-statements
        exclude: (_plugin_template|python_twitter)
        stages: [commit]

      - id: end-of-file-fixer
        exclude: .bumpversion.cfg
        stages: [commit]

      - id: check-merge-conflict
        stages: [commit]

      - id: check-case-conflict
        stages: [commit]

  - repo: https://github.com/saxix/pch
    rev: fc387f4
    hooks:
      - id: check-version-release-match
        args:
          - --pythonpath=src
          - --package=bitcater66
        stages: [push]

      - id: check-untracked
        args:
          - src
          - tests
        stages: [push]

      - id: check-forbidden
        args:
          - -p
          - \.showbrowser\(
        stages: [commit]
